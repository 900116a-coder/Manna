<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견적서 발급 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f4f3ef;
    --surface: #ffffff;
    --surface2: #f9f8f5;
    --border: #e2e0d8;
    --border-strong: #c8c5bc;
    --accent: #1a1a2e;
    --accent2: #16213e;
    --highlight: #e8451a;
    --highlight-light: #fff1ed;
    --text-primary: #1a1a2e;
    --text-secondary: #6b6860;
    --text-muted: #9e9b94;
    --success: #2d7a4f;
    --success-light: #edf7f1;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(26,26,46,0.08);
    --shadow-lg: 0 8px 32px rgba(26,26,46,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--accent);
    padding: 0 40px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--highlight);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 900; color: #fff;
    letter-spacing: -1px;
  }
  .logo-text {
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .logo-sub {
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .header-badge {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 4px 12px;
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
  }

  /* ── Layout ── */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 28px;
    align-items: start;
  }

  .main-col { display: flex; flex-direction: column; gap: 20px; }
  .side-col { position: sticky; top: 88px; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .card-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-header-num {
    width: 24px; height: 24px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
  }
  .card-header h2 {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }
  .card-header .desc {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }
  .card-body { padding: 20px 24px; }

  /* ── Loading / Error ── */
  .loading-state {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 13px;
    padding: 12px 0;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    background: #fff5f5;
    border: 1px solid #fecaca;
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    color: #b91c1c;
    font-size: 13px;
    line-height: 1.6;
  }
  .error-state strong { display: block; margin-bottom: 4px; }

  /* ── Product Grid ── */
  .product-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .product-card {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.18s ease;
    position: relative;
    background: var(--surface2);
  }
  .product-card:hover { border-color: var(--accent); background: #fff; }
  .product-card.selected {
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(26,26,46,0.08);
  }
  .product-card.selected::after {
    content: '✓';
    position: absolute;
    top: 10px; right: 12px;
    width: 20px; height: 20px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
  }
  .product-bm {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .product-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .product-price {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    font-family: 'DM Mono', monospace;
  }
  .product-discount-badge {
    display: inline-block;
    margin-top: 4px;
    font-size: 11px;
    color: var(--highlight);
    font-weight: 500;
  }

  /* ── Coupon ── */
  .coupon-section { margin-bottom: 16px; }
  .coupon-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .coupon-label .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
  }
  .badge-main { background: var(--accent); color: #fff; }
  .badge-sub { background: var(--border); color: var(--text-secondary); }

  .coupon-list { display: flex; flex-direction: column; gap: 6px; }
  .coupon-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s ease;
    background: var(--surface2);
  }
  .coupon-item:hover { border-color: var(--accent); background: #fff; }
  .coupon-item.selected {
    border-color: var(--highlight);
    background: var(--highlight-light);
  }
  .coupon-item input[type="checkbox"],
  .coupon-item input[type="radio"] {
    width: 15px; height: 15px;
    accent-color: var(--highlight);
    flex-shrink: 0;
  }
  .coupon-name {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
  }
  .coupon-amount {
    font-size: 13px;
    font-weight: 700;
    color: var(--highlight);
    font-family: 'DM Mono', monospace;
  }

  /* ── Summary Panel ── */
  .summary-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }
  .summary-header {
    background: var(--accent);
    padding: 16px 20px;
    color: #fff;
  }
  .summary-header h3 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .summary-header p {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }

  .summary-body { padding: 16px 20px; }

  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 7px 0;
    font-size: 13px;
  }
  .summary-row .label { color: var(--text-secondary); }
  .summary-row .value { font-weight: 600; font-family: 'DM Mono', monospace; }
  .summary-row.discount .value { color: var(--highlight); }

  .summary-divider {
    border: none;
    border-top: 1px dashed var(--border);
    margin: 8px 0;
  }

  .summary-discount-box {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin: 8px 0;
  }
  .summary-discount-item {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 3px 0;
    color: var(--text-secondary);
  }
  .summary-discount-item .disc-val { color: var(--highlight); font-family: 'DM Mono', monospace; }

  .summary-total {
    background: var(--accent);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .summary-total .t-label { color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 600; }
  .summary-total .t-value { color: #fff; font-size: 20px; font-weight: 900; font-family: 'DM Mono', monospace; }

  /* ── Customer Form ── */
  .form-grid { display: grid; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .form-input {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-primary);
    background: var(--surface2);
    transition: all 0.15s ease;
    outline: none;
  }
  .form-input:focus {
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(26,26,46,0.06);
  }

  /* ── Download Button ── */
  .btn-download {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    background: var(--highlight);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s ease;
    letter-spacing: -0.2px;
  }
  .btn-download:hover { background: #c93912; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(232,69,26,0.3); }
  .btn-download:active { transform: translateY(0); }
  .btn-download:disabled { background: var(--border-strong); cursor: not-allowed; transform: none; box-shadow: none; }

  .notice {
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.6;
    text-align: center;
  }

  /* ── Empty states ── */
  .empty-product {
    grid-column: 1/-1;
    text-align: center;
    padding: 24px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .container { grid-template-columns: 1fr; padding: 20px 16px 60px; }
    .side-col { position: static; }
    .product-grid { grid-template-columns: 1fr; }
    header { padding: 0 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">OT</div>
    <div>
      <div class="logo-text">운영팀</div>
      <div class="logo-sub">Estimate System</div>
    </div>
  </div>
  <div class="header-badge">견적서 발급 시스템</div>
</header>

<div class="container">
  <div class="main-col">

    <!-- STEP 1: 상품 선택 -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-num">1</div>
        <h2>상품 선택</h2>
        <span class="desc" id="product-count-label"></span>
      </div>
      <div class="card-body">
        <div id="product-loading" class="loading-state">
          <div class="spinner"></div> 상품 목록을 불러오는 중...
        </div>
        <div class="product-grid" id="product-grid" style="display:none"></div>
      </div>
    </div>

    <!-- STEP 2: 쿠폰 선택 -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-num">2</div>
        <h2>할인 쿠폰 선택</h2>
        <span class="desc">메인 1개 · 서브 최대 2개</span>
      </div>
      <div class="card-body">
        <div id="coupon-loading" class="loading-state">
          <div class="spinner"></div> 쿠폰 목록을 불러오는 중...
        </div>
        <div id="coupon-area" style="display:none">
          <div class="coupon-section">
            <div class="coupon-label">
              <span class="badge badge-main">MAIN</span> 메인 쿠폰 <small style="color:var(--text-muted)">(1개 선택)</small>
            </div>
            <div class="coupon-list" id="main-coupon-list"></div>
          </div>
          <div class="coupon-section">
            <div class="coupon-label">
              <span class="badge badge-sub">SUB</span> 서브 쿠폰 <small style="color:var(--text-muted)">(최대 2개 선택)</small>
            </div>
            <div class="coupon-list" id="sub-coupon-list"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- STEP 3: 고객 정보 -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-num">3</div>
        <h2>고객 정보 입력</h2>
      </div>
      <div class="card-body">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">고객명 *</label>
            <input class="form-input" type="text" id="customer-name" placeholder="홍길동">
          </div>
          <div class="form-group">
            <label class="form-label">연락처 *</label>
            <input class="form-input" type="tel" id="customer-phone" placeholder="010-0000-0000">
          </div>
          <div class="form-group">
            <label class="form-label">이메일</label>
            <input class="form-input" type="email" id="customer-email" placeholder="example@email.com">
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- SIDE: 결제 요약 + 다운로드 -->
  <div class="side-col">
    <div class="summary-panel">
      <div class="summary-header">
        <h3>💰 결제 금액 요약</h3>
        <p>선택 항목 기준 실시간 계산</p>
      </div>
      <div class="summary-body">
        <div class="summary-row">
          <span class="label">정가</span>
          <span class="value" id="s-original">-</span>
        </div>
        <div class="summary-row discount">
          <span class="label">상품 자동할인</span>
          <span class="value" id="s-auto-discount">-</span>
        </div>
        <div class="summary-row discount">
          <span class="label">쿠폰 할인</span>
          <span class="value" id="s-coupon-discount">-</span>
        </div>

        <div id="discount-detail-box" class="summary-discount-box" style="display:none">
          <div id="discount-detail-list"></div>
        </div>

        <hr class="summary-divider">

        <div class="summary-total">
          <span class="t-label">최종 결제가</span>
          <span class="t-value" id="s-final">-</span>
        </div>

        <!-- 고객 정보 입력 영역 (사이드) -->
        <div style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border)">
          <div style="font-size:12px; font-weight:700; color:var(--text-secondary); margin-bottom:10px; letter-spacing:0.3px; text-transform:uppercase;">견적서 다운로드</div>
          <button class="btn-download" id="download-btn" onclick="downloadPDF()" disabled>
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 15V3m0 12l-4-4m4 4l4-4M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"/></svg>
            PDF 견적서 다운로드
          </button>
          <p class="notice">상품과 고객명·연락처를 입력하면<br>다운로드가 활성화됩니다</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const SHEET_ID = '1-Qx-_Yjiy0vn5jCzj6H3cxk-TL6_wBD3bKdYF3NuFbo';
const PRODUCTS_SHEET = '상품리스트';
const COUPONS_SHEET = '쿠폰리스트';

// ── STATE ───────────────────────────────────────────────────
let products = [];
let coupons = [];
let selectedProduct = null;
let selectedMainCoupon = null;
let selectedSubCoupons = [];

// ── FETCH SHEET DATA ────────────────────────────────────────
async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));
  const cols = json.table.cols.map(c => c.label);
  const rows = json.table.rows.map(r =>
    Object.fromEntries(cols.map((col, i) => [col, r.c[i]?.v ?? '']))
  );
  return rows;
}

function formatWon(n) {
  if (n === null || n === undefined || n === '') return '-';
  return Number(n).toLocaleString('ko-KR') + '원';
}

// ── LOAD PRODUCTS ────────────────────────────────────────────
async function loadProducts() {
  try {
    const rows = await fetchSheet(PRODUCTS_SHEET);
    // 판매여부 Y인 상품만
    products = rows.filter(r => String(r['판매여부']).trim() === '판매중');
    
    document.getElementById('product-loading').style.display = 'none';
    const grid = document.getElementById('product-grid');
    grid.style.display = 'grid';
    document.getElementById('product-count-label').textContent = `총 ${products.length}개`;

    if (products.length === 0) {
      grid.innerHTML = '<div class="empty-product">판매 중인 상품이 없습니다.</div>';
      return;
    }

    grid.innerHTML = products.map((p, i) => {
      const price = Number(p['정가']) || 0;
      const disc = Number(p['상품할인']) || 0;
      return `
        <div class="product-card" id="pc-${i}" onclick="selectProduct(${i})">
          <div class="product-bm">${p['Bm'] || ''}</div>
          <div class="product-name">${p['상품명'] || '상품명 없음'}</div>
          <div class="product-price">${formatWon(price)}</div>
          ${disc > 0 ? `<div class="product-discount-badge">▼ 자동할인 ${formatWon(disc)}</div>` : ''}
        </div>
      `;
    }).join('');
  } catch(e) {
    document.getElementById('product-loading').innerHTML = `
      <div class="error-state">
        <strong>⚠ 상품 데이터를 불러올 수 없습니다</strong>
        구글 시트 공유 설정을 확인해주세요.<br>
        <small style="color:#6b7280; margin-top:4px; display:block">${e.message}</small>
      </div>
    `;
  }
}

// ── LOAD COUPONS ─────────────────────────────────────────────
async function loadCoupons() {
  try {
    const rows = await fetchSheet(COUPONS_SHEET);
    // 사용여부 Y인 쿠폰만
    coupons = rows.filter(r => String(r['사용여부']).trim() === '사용');

    document.getElementById('coupon-loading').style.display = 'none';
    document.getElementById('coupon-area').style.display = 'block';

    const mainCoupons = coupons.filter(c => String(c['쿠폰구분']).toUpperCase().includes('메인') || String(c['쿠폰구분']).toUpperCase() === 'MAIN');
    const subCoupons  = coupons.filter(c => String(c['쿠폰구분']).toUpperCase().includes('서브') || String(c['쿠폰구분']).toUpperCase() === 'SUB');

    document.getElementById('main-coupon-list').innerHTML = mainCoupons.length ? mainCoupons.map((c, i) => `
      <label class="coupon-item" id="mc-${i}" onclick="selectMainCoupon(${i}, event)">
        <input type="radio" name="main-coupon" value="${i}">
        <span class="coupon-name">${c['쿠폰명']}</span>
        <span class="coupon-amount">-${formatWon(c['할인금액'])}</span>
      </label>
    `).join('') : '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">사용 가능한 메인 쿠폰이 없습니다</div>';

    document.getElementById('sub-coupon-list').innerHTML = subCoupons.length ? subCoupons.map((c, i) => `
      <label class="coupon-item" id="sc-${i}" onclick="selectSubCoupon(${i}, event)">
        <input type="checkbox" value="${i}">
        <span class="coupon-name">${c['쿠폰명']}</span>
        <span class="coupon-amount">-${formatWon(c['할인금액'])}</span>
      </label>
    `).join('') : '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">사용 가능한 서브 쿠폰이 없습니다</div>';

    // store reference index in data attr
    mainCoupons.forEach((c, i) => { c._localIdx = i; c._globalIdx = coupons.indexOf(c); });
    subCoupons.forEach((c, i)  => { c._localIdx = i; c._globalIdx = coupons.indexOf(c); });
    window._mainCoupons = mainCoupons;
    window._subCoupons  = subCoupons;

  } catch(e) {
    document.getElementById('coupon-loading').innerHTML = `
      <div class="error-state">
        <strong>⚠ 쿠폰 데이터를 불러올 수 없습니다</strong>
        ${e.message}
      </div>
    `;
  }
}

// ── SELECTION HANDLERS ───────────────────────────────────────
function selectProduct(idx) {
  selectedProduct = products[idx];
  document.querySelectorAll('.product-card').forEach((el, i) =>
    el.classList.toggle('selected', i === idx)
  );
  updateSummary();
}

function selectMainCoupon(localIdx, e) {
  const coupon = window._mainCoupons[localIdx];
  const radio = document.querySelector(`#mc-${localIdx} input[type="radio"]`);
  if (selectedMainCoupon === coupon) {
    selectedMainCoupon = null;
    if(radio) radio.checked = false;
    document.querySelectorAll('[id^="mc-"]').forEach(el => el.classList.remove('selected'));
  } else {
    selectedMainCoupon = coupon;
    document.querySelectorAll('[id^="mc-"]').forEach((el, i) => el.classList.toggle('selected', i === localIdx));
  }
  updateSummary();
}

function selectSubCoupon(localIdx, e) {
  const coupon = window._subCoupons[localIdx];
  const el = document.getElementById(`sc-${localIdx}`);
  const cb = el.querySelector('input[type="checkbox"]');
  
  const alreadySelected = selectedSubCoupons.includes(coupon);
  if (alreadySelected) {
    selectedSubCoupons = selectedSubCoupons.filter(c => c !== coupon);
    cb.checked = false;
    el.classList.remove('selected');
  } else {
    if (selectedSubCoupons.length >= 2) {
      alert('서브 쿠폰은 최대 2개까지 선택 가능합니다.');
      cb.checked = false;
      return;
    }
    selectedSubCoupons.push(coupon);
    cb.checked = true;
    el.classList.add('selected');
  }
  updateSummary();
}

// ── SUMMARY UPDATE ───────────────────────────────────────────
function updateSummary() {
  if (!selectedProduct) {
    document.getElementById('s-original').textContent = '-';
    document.getElementById('s-auto-discount').textContent = '-';
    document.getElementById('s-coupon-discount').textContent = '-';
    document.getElementById('s-final').textContent = '-';
    document.getElementById('discount-detail-box').style.display = 'none';
    updateDownloadBtn();
    return;
  }

  const price = Number(selectedProduct['정가']) || 0;
  const autoDisc = Number(selectedProduct['상품할인']) || 0;
  const mainDisc = selectedMainCoupon ? Number(selectedMainCoupon['할인금액']) || 0 : 0;
  const subDisc  = selectedSubCoupons.reduce((s, c) => s + (Number(c['할인금액']) || 0), 0);
  const couponDisc = mainDisc + subDisc;
  const totalDisc  = autoDisc + couponDisc;
  const final = Math.max(0, price - totalDisc);

  document.getElementById('s-original').textContent = formatWon(price);
  document.getElementById('s-auto-discount').textContent = autoDisc > 0 ? `-${formatWon(autoDisc)}` : '-';
  document.getElementById('s-coupon-discount').textContent = couponDisc > 0 ? `-${formatWon(couponDisc)}` : '-';
  document.getElementById('s-final').textContent = formatWon(final);

  // Discount detail
  const details = [];
  if (autoDisc > 0) details.push({ name: '상품 자동할인', amount: autoDisc });
  if (selectedMainCoupon) details.push({ name: selectedMainCoupon['쿠폰명'], amount: mainDisc });
  selectedSubCoupons.forEach(c => details.push({ name: c['쿠폰명'], amount: Number(c['할인금액']) || 0 }));

  const box = document.getElementById('discount-detail-box');
  if (details.length > 0) {
    box.style.display = 'block';
    document.getElementById('discount-detail-list').innerHTML = details.map(d => `
      <div class="summary-discount-item">
        <span>${d.name}</span>
        <span class="disc-val">-${formatWon(d.amount)}</span>
      </div>
    `).join('');
  } else {
    box.style.display = 'none';
  }

  updateDownloadBtn();
}

function updateDownloadBtn() {
  const name = document.getElementById('customer-name').value.trim();
  const phone = document.getElementById('customer-phone').value.trim();
  const btn = document.getElementById('download-btn');
  btn.disabled = !(selectedProduct && name && phone);
}

document.getElementById('customer-name').addEventListener('input', updateDownloadBtn);
document.getElementById('customer-phone').addEventListener('input', updateDownloadBtn);
